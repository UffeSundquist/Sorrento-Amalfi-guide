<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amalfi Guide — Offline</title>
  <meta name="theme-color" content="#1a4a6e">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #fdf8f0; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: white; border-radius: 20px; padding: 40px 32px; max-width: 360px;
            text-align: center; box-shadow: 0 8px 40px rgba(26,74,110,0.12); }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 1.4rem; color: #1a4a6e; margin-bottom: 12px; }
    p { font-size: 14px; color: #7a6e63; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-block; background: #1a4a6e; color: white; border: none;
           border-radius: 12px; padding: 12px 28px; font-size: 14px; font-weight: 600;
           cursor: pointer; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⛵</div>
    <h1>You're offline</h1>
    <p>Open the Amalfi Guide once with a connection and it will work offline thereafter — transport info, restaurants, maps links and vocabulary all cached locally.</p>
    <a href="./index.html" class="btn">Try again</a>
  </div>
</body>
</html>
